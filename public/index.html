<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis XV Años</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <!-- HERO -->
  

  <section class="hero hero--image">
    
    <img
        src="./assets/images/quince-hero.jpg"
        alt=""
        class="hero__bg"
        aria-hidden="true"
    >
    
    <div class="hero__overlay"></div>
  
    <div class="hero__content">
      <h1 class="hero__title">Valeria</h1>
      <p class="hero__subtitle">Mis XV Años</p>
    </div>
  </section>
  
  

  <!-- INVITACIÓN PERSONALIZADA -->
  <section class="invitation invitation--shade animate">
    <p id="family-name">La familia invitada</p>
  </section>

  <!-- DETALLES -->
  <section class="details animate">
    <div class="detail-card">
      <span>📅</span>
      <p>15 de Junio 2026</p>
    </div>
    <div class="detail-card">
      <span>⏰</span>
      <p>7:00 PM</p>
    </div>
    <div class="detail-card">
      <span>🏛️</span>
      <p>Salón Jardín Real</p>
    </div>
  </section>

  <!-- CUENTA REGRESIVA -->
  <section class="countdown animate">
    <p class="countdown__title">Faltan</p>
    <div id="timer"></div>
  </section>

  <!-- UBICACIÓN -->
  <section class="location animate">
    <p>Salón Jardín Real, Mérida, Yucatán</p>
    <a
      href="https://maps.google.com"
      target="_blank"
      class="btn primary"
    >
      Ver en Google Maps
    </a>
  </section>

  <!-- RSVP -->
  <section class="rsvp animate">
    <p>¿Podrán acompañarnos?</p>
    <button class="btn primary">Confirmar asistencia</button>
    <button class="btn secondary">No podré asistir</button>
  </section>

  <!-- CIERRE -->
  <footer class="footer">
    <p>Gracias por ser parte de este momento tan especial</p>
    <span>Con cariño, Familia Pérez</span>
  </footer>

  <script src="./js/main.js"></script>
</body>
</html>
